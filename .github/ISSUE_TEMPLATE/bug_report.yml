name: Bug report
description: Report a reproducible defect in the portfolio framework.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include credentials, personal data, or vulnerability details.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and which file, workflow, template, or skill is affected?
      placeholder: Describe the observed behavior and its impact.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that reproduces the issue.
      placeholder: |
        1. Check out commit ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and environment
      description: Include validation output, commit, operating system, or screenshots with sensitive data removed.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This is not a security vulnerability.
          required: true
