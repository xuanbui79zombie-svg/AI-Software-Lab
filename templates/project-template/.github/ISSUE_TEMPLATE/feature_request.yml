name: Feature request
description: Propose a scoped, verifiable improvement.
title: "[Proposal]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives, risks, and maintenance cost
    validations:
      required: true
